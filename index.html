    <!-- Theme init: runs before any CSS/paint so the correct theme is applied immediately
         (no flash), and so the 'dark' class already exists on <html> before Tailwind's
         first DOM scan. -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('medplanner_theme');
                var isDark = saved ? saved === 'dark' : true; // AMOLED dark by default
                document.documentElement.classList.toggle('dark', isDark);
                document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            } catch (err) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

        const initializeEvents = (profile) => {
            const sycsGroup = profile ? getSYCSGroup(profile.roll) : 'A';
            const lifGroup = profile ? getLIFGroup(profile.roll) : 'A';
            const cblBatch = profile ? getCBLBatch(profile.roll) : 'A';

            let events = [];
            let idCounter = 1;
            const uniqueDates = new Set();

            rawSchedule.forEach(data => {
                const title = data[4] ? data[4].trim() : '';
                // FILTER: Ignore empty SIS or Seminars
                if (!title || title === 'SIS:' || title === 'SEMINAR:') return; 

                const date = data[0];
                uniqueDates.add(date);
                
                let dept = data[5];
                const category = data[3];

                // ROLL-SPECIFIC ROUTING
                if (category === 'SYCS') dept = getSYCSDept(date, sycsGroup);
                if (category === 'LIF' || category === 'FHE') dept = getLIFDept(date, lifGroup);
                if (category === 'CBL' || category === 'SGD') dept = getCBLDept(date, cblBatch);

                const seminarInfo = (category === 'SEMINAR' && profile && SEMINAR_TOPICS[profile.roll] && SEMINAR_TOPICS[profile.roll].date === date)
                    ? SEMINAR_TOPICS[profile.roll] : null;

                events.push({
                    id: `evt_${idCounter++}`,
                    date: date,
                    startTime: data[1],
                    endTime: data[2],
                    category: category,
                    title: title,
                    dept: dept,
                    presentingTopic: seminarInfo ? seminarInfo.topic : null,
                    attendance: null, // null | 'present' | 'absent'
                    isRescheduled: false,
                    isCancelled: false,
                    isAdded: false
                });
            });

            // WEDNESDAY CBL INJECTOR (10 AM - 1 PM slot per weekly template, missing from official day-by-day sheet)
            uniqueDates.forEach(date => {
                const d = new Date(date);
                const day = d.getDay(); // 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
                
                if (day === 3) {
                    const hasCBL = events.some(e => e.date === date && e.category === 'CBL');
                    if (!hasCBL) {
                        events.push({
                            id: `evt_injected_${idCounter++}`,
                            date: date,
                            startTime: '10:00',
                            endTime: '13:00',
                            category: 'CBL',
                            title: 'Case Based Learning in Hospital',
                            dept: getCBLDept(date, cblBatch),
                            presentingTopic: null,
                            attendance: null,
                            isRescheduled: false,
                            isCancelled: false,
                            isAdded: false
                        });
                    }
                }
            });

            return events;
        };

                const nowStr = now.toTimeString().slice(0,5);
                const nextClass = todayEvents.find(e => e.endTime > nowStr);

                const sycsGroup = getSYCSGroup(profile.roll);
                const lifGroup = getLIFGroup(profile.roll);
                const cblBatch = getCBLBatch(profile.roll);

                const currentSYCS = getSYCSDept(todayStr, sycsGroup);
                const currentLIF = getLIFDept(todayStr, lifGroup);
                const currentCBL = getCBLDept(todayStr, cblBatch);

                const fmtChangeDate = (d) => d ? d.toLocaleDateString('default', { month: 'short', day: 'numeric' }) : 'End of semester';

                // Seminar countdown: only shown within 7 days before, disappears after it ends
                const mySeminar = SEMINAR_TOPICS[profile.roll];
                let seminarCountdown = null;
                if (mySeminar) {
                    const seminarStart = new Date(`${mySeminar.date}T14:00:00`);
                    const seminarEnd = new Date(`${mySeminar.date}T17:00:00`);
                    const msUntil = seminarStart - now;
                    const daysUntil = msUntil / (1000 * 60 * 60 * 24);
                    if (now < seminarEnd && daysUntil <= 7) {
                        seminarCountdown = { ...mySeminar, daysUntil: Math.max(0, Math.ceil(daysUntil)), isPast: now > seminarStart };
                    }
                }

                return (
                    <div className="p-4 max-w-3xl mx-auto pb-24 space-y-5">
                        {/* Greeting */}
                        <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-5">
                            <p className="text-slate-400 dark:text-zinc-500 text-xs font-black uppercase tracking-wider mb-1">
                                {now.toLocaleDateString('default', { weekday: 'long' })}
                            </p>
                            <h2 className="text-2xl font-black text-slate-800 dark:text-zinc-100">
                                {now.toLocaleDateString('default', { month: 'long', day: 'numeric', year: 'numeric' })}
                            </h2>
                            {nextClass ? (
                                <p className="text-indigo-400 text-sm font-bold mt-2">
                                    Next: {nextClass.title} at {nextClass.startTime}
                                </p>
                            ) : (
                                <p className="text-slate-400 dark:text-zinc-500 text-sm font-bold mt-2">
                                    {todayEvents.length === 0 ? 'No classes scheduled today' : 'All classes done for today'}
                                </p>
                            )}
                        </div>

                        {/* Seminar Countdown - only within 7 days before, gone after it ends */}
                        {seminarCountdown && (
                            <div className="bg-fuchsia-50 dark:bg-fuchsia-950/40 rounded-2xl border-2 border-fuchsia-200 dark:border-fuchsia-800 p-5">
                                <div className="flex items-center justify-between mb-2">
                                    <h3 className="text-[10px] font-black text-fuchsia-700 dark:text-fuchsia-300 uppercase tracking-wider">Your Seminar Presentation</h3>
                                    <span className="text-[10px] font-black text-fuchsia-700 dark:text-fuchsia-300 bg-fuchsia-900/60 px-2 py-1 rounded-full">
                                        {seminarCountdown.isPast ? 'Today' : seminarCountdown.daysUntil === 0 ? 'Today' : `${seminarCountdown.daysUntil}d left`}
                                    </span>
                                </div>
                                <p className="font-black text-slate-800 dark:text-zinc-100 text-lg leading-tight">{seminarCountdown.topic}</p>
                                <p className="text-fuchsia-700 dark:text-fuchsia-300 text-sm font-bold mt-1">{seminarCountdown.seminar}</p>
                                <p className="text-slate-400 dark:text-zinc-500 text-xs font-semibold mt-2">
                                    {new Date(seminarCountdown.date).toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric' })} · 2:00 PM
                                </p>
                            </div>
                        )}

                        {/* Current Rotations */}
                        <div>
                            <h3 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-wider mb-2 px-1">Current Rotations</h3>
                            <div className="grid grid-cols-3 gap-3">
                                {[
                                    { label: 'SYCS', dept: currentSYCS, next: sycsNextChangeDate(todayStr) },
                                    { label: 'LIF', dept: currentLIF, next: lifNextChangeDate(todayStr) },
                                    { label: 'CBL', dept: currentCBL, next: cblNextChangeDate(todayStr) }
                                ].map(r => (
                                    <div key={r.label} className={`rounded-2xl border p-3 text-center ${getDeptColor(r.dept)}`}>
                                        <div className="text-[10px] font-black uppercase tracking-wider opacity-70 mb-1">{r.label}</div>
                                        <div className="text-xs font-bold leading-tight mb-1.5">{r.dept}</div>
                                        <div className="text-[9px] font-bold opacity-60 leading-tight">Changes {fmtChangeDate(r.next)}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Today's Classes */}
                        <div>
                            <div className="flex justify-between items-center mb-2 px-1">
                                <h3 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-wider">Today's Classes</h3>
                                <button onClick={() => { setCurrentDate(new Date()); setView('day'); }} className="text-[10px] font-black text-indigo-400 uppercase tracking-wider">
                                    Full Day View →
                                </button>
                            </div>
                            {todayEvents.length === 0 ? (
                                <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-6 text-center text-slate-400 dark:text-zinc-500 font-bold text-sm">
                                    No classes today. Enjoy the break!
                                </div>
                            ) : (
                                <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-3">
                                    {todayEvents.map(event => (
                                        <EventBadge key={event.id} event={event} onClick={(e) => { setSelectedEvent(e); setIsModalOpen(true); }} isCompact />
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Attendance Snapshot */}
                        <div>
                            <div className="flex justify-between items-center mb-2 px-1">
                                <h3 className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-wider">Attendance Snapshot</h3>
                                <button onClick={() => setView('attendance')} className="text-[10px] font-black text-indigo-400 uppercase tracking-wider">
                                    Full Tracker →
                                </button>
                            </div>
                            <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800 p-5 flex items-center gap-5">
                                <div className={`text-3xl font-black ${attendancePct === null ? 'text-slate-300 dark:text-zinc-600' : attendancePct >= 80 ? 'text-green-400' : attendancePct >= 70 ? 'text-yellow-400' : 'text-red-400'}`}>
                                    {attendancePct === null ? '—' : `${attendancePct}%`}
                                </div>
                                <div className="flex-1 grid grid-cols-2 gap-2 text-xs font-bold">
                                    <div className="text-green-400">Present: {totalPresent}</div>
                                    <div className="text-red-400">Absent: {totalAbsent}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderDayView = () => {
                const dateStr = getLocalYYYYMMDD(currentDate);
                const dayEvents = events.filter(e => e.date === dateStr && !e.isCancelled).sort((a,b) => a.startTime.localeCompare(b.startTime));
                
                // UI SCALE FACTOR: 1 Hour = 90 pixels (fixes text overlap!)
                const HOUR_HEIGHT = 90;
                const MINUTE_HEIGHT = HOUR_HEIGHT / 60;

                // Dynamic Hour Grid Calculation - Expands downwards if class goes late!
                let maxHour = 17; // 5 PM default bottom limit
                dayEvents.forEach(e => {
                    const [eH, eM] = e.endTime.split(':').map(Number);
                    const endingHour = eM > 0 ? eH + 1 : eH;
                    if (endingHour > maxHour) maxHour = endingHour;
                });

                const totalHours = maxHour - 8 + 1;
                const hours = Array.from({length: totalHours}).map((_, i) => i + 8);
                const containerHeight = (totalHours * HOUR_HEIGHT) + 20; 

                return (
                    <div className="p-4 max-w-3xl mx-auto pb-24">
                        <div className="flex justify-between items-center mb-6 bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800">
                            <button onClick={() => {
                                const newD = new Date(currentDate);
                                newD.setDate(newD.getDate() - 1);
                                setCurrentDate(newD);
                            }} className="p-2 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 rounded-full hover:bg-indigo-100 dark:hover:bg-indigo-950/60">
                                <ChevronLeft size={20} />
                            </button>
                            <div className="text-center">
                                <h2 className="text-xl font-bold text-slate-700 dark:text-zinc-200">
                                    {currentDate.toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric' })}
                                </h2>
                            </div>
                            <button onClick={() => {
                                const newD = new Date(currentDate);
                                newD.setDate(newD.getDate() + 1);
                                setCurrentDate(newD);
                            }} className="p-2 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 rounded-full hover:bg-indigo-100 dark:hover:bg-indigo-950/60">
                                <ChevronRight size={20} />
                            </button>
                        </div>

                        <div className="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 p-4 relative overflow-hidden" style={{ minHeight: `${containerHeight}px`}}>
                            {/* Time lines */}
                            {hours.map(hour => (
                                <div key={hour} className="flex border-t border-gray-100 dark:border-zinc-800 relative" style={{ height: `${HOUR_HEIGHT}px` }}>
                                    <span className="w-16 text-[10px] sm:text-xs font-bold text-slate-400 dark:text-zinc-500 absolute -top-2.5 bg-white dark:bg-zinc-900 pr-2">{hour}:00</span>
                                </div>
                            ))}

                            {/* Events Absolute Positioning */}
                            {dayEvents.map(event => {
                                const [sH, sM] = event.startTime.split(':').map(Number);
                                const [eH, eM] = event.endTime.split(':').map(Number);
                                
                                const startOffset = ((sH - 8) * 60 + sM) * MINUTE_HEIGHT;
                                const duration = ((eH - sH) * 60 + eM - sM) * MINUTE_HEIGHT;
                                
                                if(startOffset < 0) return null; // Before 8 AM

                                let statusClass = "bg-blue-100 dark:bg-blue-950/60 border-blue-300 dark:border-blue-700 text-blue-900 dark:text-blue-200 border";
                                if (event.presentingTopic) statusClass = "bg-fuchsia-100 dark:bg-fuchsia-950/70 border-fuchsia-400 dark:border-fuchsia-500 text-fuchsia-900 dark:text-fuchsia-100 border-2 shadow-[0_0_14px_rgba(217,70,239,0.4)]";
                                else if (event.isAdded) statusClass = "bg-fuchsia-100 dark:bg-fuchsia-950/60 border-fuchsia-300 dark:border-fuchsia-700 text-fuchsia-900 dark:text-fuchsia-200 border-2 shadow-[0_0_10px_rgba(217,70,239,0.3)]";
                                else if (event.attendance === 'present') statusClass = "bg-green-100 dark:bg-green-950/60 border-green-300 dark:border-green-700 text-green-900 dark:text-green-200 border-2 shadow-sm";
                                else if (event.attendance === 'absent') statusClass = "bg-red-100 dark:bg-red-950/60 border-red-300 dark:border-red-700 text-red-900 dark:text-red-200 border-2 shadow-sm";
                                else if (event.isRescheduled) statusClass = "bg-yellow-100 dark:bg-yellow-950/60 border-yellow-300 dark:border-yellow-700 text-yellow-900 dark:text-yellow-200 border-2";
                                
                                const deptStyle = getDeptColor(event.dept);

                                return (
                                    <div 
                                        key={event.id}
                                        onClick={() => { setSelectedEvent(event); setIsModalOpen(true); }}
                                        className={`absolute left-16 right-4 rounded-xl p-2.5 overflow-hidden hover:shadow-md transition-shadow cursor-pointer flex flex-col ${statusClass}`}
                                        style={{
                                            top: `${startOffset + 16}px`, 
                                            height: `${duration}px`,
                                        }}
                                    >
                                        <div className="text-[10px] sm:text-xs font-black mb-0.5">{event.startTime} - {event.endTime}</div>
                                        <div className="font-bold text-xs sm:text-sm leading-snug line-clamp-2 min-h-0">{event.title}</div>
                                        {event.presentingTopic && (
                                            <div className="text-[10px] sm:text-xs font-black text-fuchsia-700 dark:text-fuchsia-300 leading-tight">You're presenting: {event.presentingTopic}</div>
                                        )}
                                        <div className="mt-auto flex justify-between items-end pt-1 gap-2 overflow-hidden">
                                            <span className={`text-[10px] px-1.5 py-0.5 rounded font-black truncate ${deptStyle}`}>{event.dept}</span>
                                            <span className="text-[10px] bg-black/5 px-1.5 py-0.5 rounded uppercase font-black text-slate-700 dark:text-zinc-200 shrink-0">{event.category}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderMonthView = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(i);

                return (
                    <div className="p-4 max-w-5xl mx-auto pb-24">
                        <div className="flex justify-between items-center mb-6 bg-white dark:bg-zinc-900 p-3 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800">
                            <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 bg-gray-100 dark:bg-zinc-800 rounded-full hover:bg-gray-200 dark:hover:bg-zinc-700">
                                <ChevronLeft size={20} />
                            </button>
                            <h2 className="text-lg font-bold text-slate-700 dark:text-zinc-200">
                                {currentDate.toLocaleString('default', { month: 'long' })} {year}
                            </h2>
                            <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 bg-gray-100 dark:bg-zinc-800 rounded-full hover:bg-gray-200 dark:hover:bg-zinc-700">
                                <ChevronRight size={20} />
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-7 gap-1 sm:gap-2">
                            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                                <div key={d} className="text-center font-black text-slate-400 dark:text-zinc-500 text-xs sm:text-sm py-2 uppercase tracking-wider">{d}</div>
                            ))}
                            {days.map((day, idx) => {
                                if (!day) return <div key={idx} className="p-2"></div>;
                                
                                const d = new Date(year, month, day);
                                const dateStr = getLocalYYYYMMDD(d);
                                const dayEvents = events.filter(e => e.date === dateStr);
                                
                                return (
                                    <div key={idx} className="border border-gray-100 dark:border-zinc-800 rounded-xl p-1 sm:p-2 min-h-[100px] bg-white dark:bg-zinc-900 shadow-sm flex flex-col hover:border-indigo-200 dark:hover:border-indigo-800 transition-colors">
                                        <span className={`text-xs sm:text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full mb-1 ${getLocalYYYYMMDD(new Date()) === dateStr ? 'bg-indigo-600 text-white' : 'text-slate-600 dark:text-zinc-300'}`}>
                                            {day}
                                        </span>
                                        <div className="flex-1 overflow-y-auto hidden-scrollbar space-y-1">
                                            {dayEvents.map(e => {
                                                let pillClass = "bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-300 border-blue-200 dark:border-blue-800";
                                                if (e.isCancelled) pillClass = "bg-gray-100 dark:bg-zinc-800 text-slate-400 dark:text-zinc-500 line-through";
                                                else if (e.isAdded) pillClass = "bg-fuchsia-50 dark:bg-fuchsia-950/40 text-fuchsia-700 dark:text-fuchsia-300 border-fuchsia-200 dark:border-fuchsia-800 border-2";
                                                else if (e.attendance === 'present') pillClass = "bg-green-50 dark:bg-green-950/40 text-green-700 dark:text-green-300 border-green-200 dark:border-green-800";
                                                else if (e.attendance === 'absent') pillClass = "bg-red-50 dark:bg-red-950/40 text-red-700 dark:text-red-300 border-red-200 dark:border-red-800";
                                                else if (e.isRescheduled) pillClass = "bg-yellow-50 dark:bg-yellow-950/40 text-yellow-700 dark:text-yellow-300 border-yellow-200 dark:border-yellow-800";

                                                return (
                                                    <div 
                                                        key={e.id} 
                                                        onClick={() => { setSelectedEvent(e); setIsModalOpen(true); }}
                                                        className={`w-full px-1.5 py-1 rounded text-[10px] sm:text-xs cursor-pointer truncate font-bold border ${pillClass}`}
                                                    >
                                                        {e.category}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderWeekView = () => {
                const startOfWeek = new Date(currentDate);
                startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
                
                const weekDays = Array.from({length: 7}).map((_, i) => {
                    const d = new Date(startOfWeek);
                    d.setDate(d.getDate() + i);
                    return d;
                });

                return (
                    <div className="p-4 max-w-3xl mx-auto pb-24">
                        <div className="flex justify-between items-center mb-6 bg-white dark:bg-zinc-900 p-3 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800">
                            <button onClick={() => {
                                const newD = new Date(currentDate);
                                newD.setDate(newD.getDate() - 7);
                                setCurrentDate(newD);
                            }} className="p-2 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 rounded-full hover:bg-indigo-100 dark:hover:bg-indigo-950/60">
                                <ChevronLeft size={20} />
                            </button>
                            <div className="text-center">
                                <h2 className="text-lg font-bold text-slate-700 dark:text-zinc-200">
                                    Week of {startOfWeek.toLocaleDateString('default', { month: 'short', day: 'numeric' })}
                                </h2>
                                <p className="text-xs font-semibold text-slate-400 dark:text-zinc-500">Tap a card to update status</p>
                            </div>
                            <button onClick={() => {
                                const newD = new Date(currentDate);
                                newD.setDate(newD.getDate() + 7);
                                setCurrentDate(newD);
                            }} className="p-2 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 rounded-full hover:bg-indigo-100 dark:hover:bg-indigo-950/60">
                                <ChevronRight size={20} />
                            </button>
                        </div>

                        <div className="space-y-6">
                            {weekDays.map(date => {
                                const dateStr = getLocalYYYYMMDD(date);
                                const dayEvents = events.filter(e => e.date === dateStr).sort((a,b) => a.startTime.localeCompare(b.startTime));
                                
                                if (dayEvents.length === 0 && (date.getDay() === 0 || date.getDay() === 6)) return null;

                                return (
                                    <div key={dateStr} className="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-800 overflow-hidden">
                                        <div className="bg-slate-50 dark:bg-black px-5 py-3 border-b border-gray-100 dark:border-zinc-800 font-bold text-slate-800 dark:text-zinc-100 flex justify-between items-center">
                                            <span className="flex items-center gap-2">
                                                {getLocalYYYYMMDD(new Date()) === dateStr && <span className="w-2 h-2 rounded-full bg-indigo-600"></span>}
                                                {date.toLocaleDateString('default', { weekday: 'long' })}
                                            </span>
                                            <span className="text-slate-400 dark:text-zinc-500 font-bold text-sm">{date.toLocaleDateString('default', { month: 'short', day: 'numeric' })}</span>
                                        </div>
                                        <div className="p-4">
                                            {dayEvents.length > 0 ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                    {dayEvents.map(e => (
                                                        <EventBadge 
                                                            key={e.id} 
                                                            event={e} 
                                                            onClick={(evt) => { setSelectedEvent(evt); setIsModalOpen(true); }} 
                                                        />
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-sm font-bold text-slate-400 dark:text-zinc-500 italic text-center py-6 bg-black/50 rounded-xl border border-dashed border-gray-200 dark:border-zinc-700">
                                                    Enjoy the time off! No classes today.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderAttendanceCalculator = () => {
                // Dynamic Filter: Ignore cancelled classes!
                const relevantEvents = events.filter(e => 
                    selectedCategories.includes(e.category) && 
                    !e.isCancelled
                );
                
                const totalScheduled = relevantEvents.length;
                const pastConducted = relevantEvents.filter(e => e.attendance !== null).length;
                const attended = relevantEvents.filter(e => e.attendance === 'present').length;
                const absent = relevantEvents.filter(e => e.attendance === 'absent').length;
                
                const requiredFor80 = Math.ceil(totalScheduled * 0.8);
                const buffer = totalScheduled - requiredFor80 - absent;

                const toggleCategory = (cat) => {
                    setSelectedCategories(prev => 
                        prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]
                    );
                };

                return (
                    <div className="p-4 max-w-3xl mx-auto space-y-6 pb-24">
                        
                        <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-zinc-800">
                            <h3 className="font-bold text-slate-700 dark:text-zinc-200 mb-2 flex items-center gap-2">
                                <Calculator size={20} className="text-indigo-600"/> 
                                Filter Categories
                            </h3>
                            <p className="text-sm font-medium text-slate-400 dark:text-zinc-500 mb-5">Select categories to calculate combined 80% requirement (ignores cancelled classes, includes added ones):</p>
                            
                            <div className="flex flex-wrap gap-2">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => toggleCategory(cat)}
                                        className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${selectedCategories.includes(cat) ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 text-slate-400 dark:text-zinc-500 border border-gray-200 dark:border-zinc-700 hover:bg-gray-100 dark:hover:bg-zinc-800 hover:text-slate-500 dark:hover:text-zinc-400'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-zinc-800">
                            <h3 className="font-black text-slate-700 dark:text-zinc-200 mb-6 text-xl">Attendance Report</h3>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-8">
                                <div className="p-4 bg-slate-50 dark:bg-black rounded-2xl border border-gray-100 dark:border-zinc-800">
                                    <div className="text-[10px] font-black text-slate-400 dark:text-zinc-500 uppercase tracking-wider mb-1">Total Sem</div>
                                    <div className="text-3xl font-black text-slate-800 dark:text-zinc-100">{totalScheduled}</div>
                                </div>
                                <div className="p-4 bg-blue-50 dark:bg-blue-950/40 rounded-2xl border border-blue-100 dark:border-blue-900">
                                    <div className="text-[10px] font-black text-blue-500 uppercase tracking-wider mb-1">Conducted</div>

                        {view === 'month' && renderMonthView()}
                        {view === 'week' && renderWeekView()}
                        {view === 'attendance' && renderAttendanceCalculator()}
                    </main>

                    {/* Floating Add Button */}
                    <button 
                        onClick={() => setIsAddModalOpen(true)}
                        className="fixed bottom-6 right-6 p-4 bg-fuchsia-600 text-white rounded-full shadow-xl shadow-fuchsia-600/40 hover:scale-110 transition-transform z-40 focus:outline-none border-4 border-fuchsia-800/30"
                    >
                        <Plus size={32} strokeWidth={3} />
                    </button>

                    {isModalOpen && <EventModal />}
                    {isAddModalOpen && <AddEventModal />}
                    {isSettingsOpen && <SettingsPanel />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((err) => {
                    console.error('Service worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
